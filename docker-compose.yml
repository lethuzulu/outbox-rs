services:
  postgres:
    image: postgres:16-alpine
    container_name: outbox-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: outbox
    ports:
      - "5433:5432"
    volumes:
      - outbox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outbox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  outbox_postgres_data: